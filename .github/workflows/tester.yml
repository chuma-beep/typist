name: Go CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Verify dependencies
        run: go mod tidy
        
	  - name: Cache Go modules
		uses: actions/cache@v4
		with:
			path: |
				~/.cache/go-build
				~/go/pkg/mod
			key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build ./...
