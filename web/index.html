<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>typist</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --base:#1e1e2e; --mantle:#181825; --s0:#313244; --s1:#45475a; --ov0:#6c7086;
  --text:#cdd6f4; --sub0:#a6adc8;
  --mauve:#cba6f7; --green:#a6e3a1; --red:#f38ba8;
  --yellow:#f9e2af; --blue:#89b4fa; --sky:#89dceb; --peach:#fab387;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--base);color:var(--text);
  font-family:'Courier New',monospace;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1.5rem;padding:2rem;
}
header{text-align:center;}
h1{font-size:2rem;color:var(--mauve);letter-spacing:.2em;}
.subtitle{color:var(--s1);font-size:.8rem;margin-top:.25rem;}
.controls{display:flex;flex-direction:column;align-items:center;gap:.5rem;}
.btn-row{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;}
.btn{
  background:transparent;border:1px solid var(--s0);color:var(--ov0);
  padding:.25rem .8rem;border-radius:6px;cursor:pointer;
  font-family:inherit;font-size:.85rem;transition:all .15s;
}
.btn:hover{border-color:var(--s1);color:var(--sub0);}
.btn.active{background:var(--mauve);border-color:var(--mauve);color:var(--base);font-weight:bold;}

/* ── Typing area ── */
#typing-area{width:min(720px,100%);}
#attribution{color:var(--s1);font-size:.78rem;margin-bottom:.4rem;min-height:1.1em;}

/* Code display: pre-formatted, line by line */
#word-display{
  font-size:1.2rem;line-height:1.9rem;
  height:calc(3*1.9rem);overflow:hidden;user-select:none;
}
/* Code mode: each line is a block div */
.code-line{display:block;white-space:pre;}
/* Prose mode: inline spans flow naturally */
.word{display:inline-block;margin-right:.4em;}

.char{color:var(--s1);}
.char.correct{color:var(--green);}
.char.wrong{color:var(--red);}
.char.cursor{color:var(--text);border-bottom:2px solid var(--mauve);}
/* Syntax highlight classes (pending chars) */
.char.hl-keyword{color:var(--mauve);}
.char.hl-builtin{color:var(--sky);}
.char.hl-string{color:var(--green);}
.char.hl-comment{color:var(--ov0);}
.char.hl-number{color:var(--peach);}
.char.hl-punct{color:var(--blue);}

.stats{display:flex;gap:1.5rem;margin-top:1rem;font-size:.9rem;color:var(--ov0);flex-wrap:wrap;}
.sv{font-weight:bold;}
.sv.wpm{color:var(--yellow);}
.sv.acc{color:var(--sky);}
.sv.timer{color:var(--blue);}
.sv.timer.warn{color:var(--red);}
.hint{color:var(--s1);font-size:.7rem;margin-top:.3rem;}
#hidden-input{position:fixed;left:-9999px;opacity:0;pointer-events:none;}

/* ── WPM Chart ── */
#chart-wrap{
  width:min(720px,100%);display:none;
  background:var(--mantle);border:1px solid var(--s0);
  border-radius:8px;padding:.75rem 1rem .5rem;
}
#chart-wrap h3{font-size:.75rem;color:var(--ov0);margin-bottom:.5rem;font-weight:normal;}
#wpm-chart{max-height:110px;}

/* ── Keyboard heatmap ── */
#heatmap-wrap{
  width:min(720px,100%);display:none;
  background:var(--mantle);border:1px solid var(--s0);
  border-radius:8px;padding:.75rem 1rem;
}
#heatmap-wrap h3{font-size:.75rem;color:var(--ov0);margin-bottom:.6rem;font-weight:normal;}
.kb-row{display:flex;gap:3px;margin-bottom:3px;}
.key{
  min-width:30px;height:30px;border-radius:4px;
  background:var(--s0);color:var(--sub0);
  display:flex;align-items:center;justify-content:center;
  font-size:.65rem;border:1px solid var(--s1);
  transition:background .3s;cursor:default;
}
.key.w15{min-width:46px;}.key.w2{min-width:60px;}.key.spc{min-width:190px;}

/* ── Results ── */
#results{display:none;flex-direction:column;align-items:center;gap:1rem;}
.result-card{
  border:1px solid var(--s0);border-radius:10px;
  padding:1.4rem 2.2rem;display:grid;
  grid-template-columns:1fr 1fr;gap:.4rem 2.5rem;
}
.rl{color:var(--ov0);font-size:.72rem;}
.rv{font-size:1.4rem;font-weight:bold;}
.rv.wpm{color:var(--yellow);}.rv.acc{color:var(--sky);}.rv.secs{color:var(--blue);}
.pb-badge{
  display:none;background:var(--yellow);color:var(--base);
  font-size:.6rem;font-weight:bold;padding:.1rem .35rem;
  border-radius:3px;margin-left:.35rem;vertical-align:middle;
}
.result-actions{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;}
.result-actions .btn{padding:.4rem 1rem;}
</style>
</head>
<body>

<header>
  <h1>typist</h1>
  <div class="subtitle">offline · open source · no paywall</div>
</header>

<div class="controls">
  <div class="btn-row" id="mode-btns">
    <button class="btn active" data-mode="words">words</button>
    <button class="btn"        data-mode="time">time</button>
    <button class="btn"        data-mode="quote">quote</button>
    <button class="btn"        data-mode="code">code</button>
  </div>
  <div class="btn-row" id="sub-btns" style="display:none"></div>
</div>

<div id="typing-area">
  <div id="attribution"></div>
  <div id="word-display"></div>
  <div class="stats">
    <span><span class="sv wpm" id="st-wpm">0</span> wpm</span>
    <span><span class="sv acc" id="st-acc">100</span>% acc</span>
    <span id="timer-wrap" style="display:none"><span class="sv timer" id="st-timer">30</span>s</span>
  </div>
  <div class="hint">ctrl+r restart &nbsp;·&nbsp; click to focus</div>
</div>

<div id="chart-wrap">
  <h3>wpm over time</h3>
  <canvas id="wpm-chart"></canvas>
</div>

<div id="heatmap-wrap">
  <h3>mistake heatmap</h3>
  <div id="keyboard"></div>
</div>

<div id="results">
  <div class="result-card">
    <div><div class="rl">wpm</div>
      <div class="rv wpm" id="r-wpm">0<span class="pb-badge" id="pb-badge">PB</span></div></div>
    <div><div class="rl">accuracy</div><div class="rv acc" id="r-acc">0%</div></div>
    <div><div class="rl">time</div><div class="rv secs" id="r-time">0s</div></div>
    <div><div class="rl">personal best</div><div class="rv" id="r-pb" style="color:var(--ov0)">—</div></div>
  </div>
  <div class="result-actions">
    <button class="btn active" id="btn-again">again</button>
    <button class="btn" id="btn-menu">change mode</button>
  </div>
</div>

<input id="hidden-input" autocomplete="off" autocorrect="off" spellcheck="false">

<script>
const $ = id => document.getElementById(id);

// ── Config ──────────────────────────────────────────────────────────────────
let mode = 'words', subOption = '';
const subOptions = {
  time: ['15s','30s','60s','120s'],
  code: ['go','js','python','rust'],
};
const timeSecs = {'15s':15,'30s':30,'60s':60,'120s':120};

// ── State ───────────────────────────────────────────────────────────────────
let targetText = '', serverKinds = []; // kinds from Chroma via /api/snippet
let charEls = [];
let inputIdx = 0, totalKeys = 0, errors = 0;
let startTime = null, timerInterval = null, timeLeft = 30;
let running = false, finished = false;
let mistakeMap = {}, wpmHistory = [];
let wpmChart = null, wpmInterval = null;

// ── Sub-option row ──────────────────────────────────────────────────────────
function buildSubBtns() {
  const opts = subOptions[mode];
  const wrap = $('sub-btns');
  if (!opts) { wrap.style.display='none'; return; }
  wrap.style.display = 'flex';
  wrap.innerHTML = '';
  opts.forEach((label, i) => {
    const b = document.createElement('button');
    b.className = 'btn' + (i===0 ? ' active' : '');
    b.textContent = label;
    b.onclick = () => {
      wrap.querySelectorAll('.btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      subOption = label;
      loadTest();
    };
    wrap.appendChild(b);
  });
  subOption = opts[0];
}

// ── Load test ───────────────────────────────────────────────────────────────
async function loadTest() {
  reset();
  serverKinds = [];

  if (mode === 'words') {
    targetText = (await (await fetch('/api/words')).json()).text;
    $('attribution').textContent = '';
  } else if (mode === 'time') {
    const d = await (await fetch('/api/words')).json();
    targetText = d.text + ' ' + d.text;
    $('attribution').textContent = '';
  } else if (mode === 'quote') {
    const q = await (await fetch('/api/quote')).json();
    targetText = q.text;
    $('attribution').textContent = '— ' + q.author;
  } else if (mode === 'code') {
    const lang = subOption || 'go';
    const d = await (await fetch('/api/snippet?lang='+lang)).json();
    targetText = d.code;
    serverKinds = d.kinds || [];  // Chroma token kinds, one per rune
    $('attribution').textContent = lang + ' snippet';
  }

  buildDisplay();
  focusInput();
}

function reset() {
  clearInterval(timerInterval); clearInterval(wpmInterval);
  timerInterval = null; wpmInterval = null;
  startTime = null; inputIdx = 0; totalKeys = 0; errors = 0;
  mistakeMap = {}; wpmHistory = [];
  timeLeft = timeSecs[subOption] || 30;
  running = false; finished = false;
  $('hidden-input').value = '';
  $('st-wpm').textContent = '0'; $('st-acc').textContent = '100';
  $('st-timer').textContent = timeLeft; $('st-timer').classList.remove('warn');
  $('results').style.display = 'none';
  $('chart-wrap').style.display = 'none';
  $('heatmap-wrap').style.display = 'none';
  $('typing-area').style.display = '';
  $('controls').style.display = '';
  if (wpmChart) { wpmChart.destroy(); wpmChart = null; }
}

// ── Display builder ─────────────────────────────────────────────────────────
function buildDisplay() {
  const display = $('word-display');
  display.innerHTML = ''; charEls = [];

  if (mode === 'code') {
    buildCodeDisplay(display);
  } else {
    buildProseDisplay(display);
  }

  if (charEls.length > 0) charEls[0].classList.add('cursor');
}

// Code display: one <div class="code-line"> per line, preserving indentation.
// Newlines are shown as ↵ and must be typed (Enter key).
function buildCodeDisplay(display) {
  const lines = targetText.split(/(?<=\n)/g); // split after each \n, keep \n
  let absPos = 0;
  lines.forEach(line => {
    const lineEl = document.createElement('div');
    lineEl.className = 'code-line';
    for (const ch of line) {
      const span = document.createElement('span');
      span.className = 'char';
      span.dataset.ch = ch;
      // Apply Chroma kind from server
      if (serverKinds.length > absPos && serverKinds[absPos] !== 'normal') {
        span.classList.add('hl-' + serverKinds[absPos]);
      }
      if (ch === '\n') {
        span.textContent = '↵';
      } else if (ch === '\t') {
        span.textContent = '    '; // 4-space tab display
        span.style.display = 'inline-block';
        span.style.width = '2.4rem';
      } else {
        span.textContent = ch;
      }
      lineEl.appendChild(span);
      charEls.push(span);
      absPos++;
    }
    display.appendChild(lineEl);
  });
}

// Prose display: words as inline-block divs, characters as spans.
function buildProseDisplay(display) {
  const words = targetText.split(' ');
  let absPos = 0;
  words.forEach((word, wi) => {
    const wordEl = document.createElement('div');
    wordEl.className = 'word';
    for (const ch of word) {
      const span = document.createElement('span');
      span.className = 'char';
      span.dataset.ch = ch;
      span.textContent = ch;
      wordEl.appendChild(span);
      charEls.push(span);
      absPos++;
    }
    if (wi < words.length - 1) {
      const sp = document.createElement('span');
      sp.className = 'char'; sp.dataset.ch = ' '; sp.textContent = ' ';
      wordEl.appendChild(sp);
      charEls.push(sp);
      absPos++;
    }
    display.appendChild(wordEl);
  });
}

// ── Input handling ──────────────────────────────────────────────────────────
$('hidden-input').addEventListener('keydown', e => {
  if (finished) return;
  if (e.ctrlKey && e.key === 'r') { e.preventDefault(); loadTest(); return; }
  if (e.key === 'Backspace') { e.preventDefault(); handleBackspace(); return; }
  if (e.key === 'Tab') { e.preventDefault(); handleChar('\t'); return; }
  if (e.key === 'Enter' && mode === 'code') { e.preventDefault(); handleChar('\n'); return; }
});

$('hidden-input').addEventListener('input', e => {
  if (finished) return;
  const val = $('hidden-input').value;
  if (!val) return;
  const ch = val[val.length-1];
  $('hidden-input').value = '';
  handleChar(ch);
});

function handleChar(ch) {
  if (inputIdx >= charEls.length) return;
  if (!running) startTest();

  const expected = charEls[inputIdx].dataset.ch;
  totalKeys++;
  if (ch !== expected) {
    errors++;
    const disp = expected === '\n' ? 'enter' : expected === '\t' ? 'tab' : expected;
    mistakeMap[disp] = (mistakeMap[disp]||0) + 1;
  }

  const el = charEls[inputIdx];
  el.classList.remove('cursor');
  // Remove syntax highlight class — it's been typed now
  el.classList.remove('hl-keyword','hl-builtin','hl-string','hl-comment','hl-number','hl-punct');
  el.classList.add(ch === expected ? 'correct' : 'wrong');

  inputIdx++;
  scrollIfNeeded();
  if (inputIdx < charEls.length) charEls[inputIdx].classList.add('cursor');
  if (mode !== 'time' && inputIdx >= charEls.length) endTest();
  updateStats();
}

function handleBackspace() {
  if (inputIdx === 0) return;
  inputIdx--;
  const el = charEls[inputIdx];
  el.classList.remove('correct','wrong');
  // Restore syntax highlight class if applicable
  if (serverKinds.length > inputIdx && serverKinds[inputIdx] !== 'normal') {
    el.classList.add('hl-' + serverKinds[inputIdx]);
  }
  el.classList.add('cursor');
  if (charEls[inputIdx+1]) charEls[inputIdx+1].classList.remove('cursor');
  scrollIfNeeded();
  updateStats();
}

function scrollIfNeeded() {
  const display = $('word-display');
  const el = charEls[Math.min(inputIdx, charEls.length-1)];
  const lh = parseFloat(getComputedStyle(display).lineHeight) || 30;
  const top = (mode === 'code') ? el.parentElement.offsetTop : el.parentElement.offsetTop;
  if (top + lh > display.scrollTop + display.clientHeight)
    display.scrollTop = top + lh - display.clientHeight + lh * .5;
}

// ── Timers & stats ──────────────────────────────────────────────────────────
function startTest() {
  running = true; startTime = Date.now();
  if (mode === 'time') {
    $('timer-wrap').style.display = '';
    timerInterval = setInterval(() => {
      timeLeft--;
      $('st-timer').textContent = timeLeft;
      if (timeLeft <= 10) $('st-timer').classList.add('warn');
      if (timeLeft <= 0) endTest();
    }, 1000);
  }
  wpmInterval = setInterval(() => {
    wpmHistory.push({t: (Date.now()-startTime)/1000, wpm: calcWPM()});
    updateStats();
  }, 1000);
}

function updateStats() {
  $('st-wpm').textContent = Math.round(calcWPM());
  $('st-acc').textContent  = Math.round(calcAcc());
}

function calcWPM() {
  if (!startTime) return 0;
  const mins = (Date.now()-startTime)/60000;
  if (!mins) return 0;
  const correct = charEls.slice(0,inputIdx).filter(e=>e.classList.contains('correct')).length;
  return correct/5/mins;
}

function calcAcc() {
  return totalKeys ? (totalKeys-errors)/totalKeys*100 : 100;
}

// ── End test ────────────────────────────────────────────────────────────────
async function endTest() {
  clearInterval(timerInterval); clearInterval(wpmInterval);
  finished = true;
  const elapsed = (Date.now()-startTime)/1000;
  const wpm = Math.round(calcWPM());
  const acc = calcAcc().toFixed(1);
  wpmHistory.push({t: elapsed, wpm});

  const lang = mode==='code' ? (subOption||'go') : '';
  const dur  = mode==='time' ? (timeSecs[subOption]||30) : 0;
  await fetch('/api/score', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({wpm, accuracy:parseFloat(acc), mode, lang, duration_seconds:dur, at:new Date().toISOString()})
  });

  const scores = await (await fetch('/api/scores')).json();
  const filtered = (scores||[]).filter(s=>s.mode===mode && s.duration_seconds===dur && s.lang===lang);
  const pb = filtered.length ? Math.max(...filtered.map(s=>s.wpm)) : wpm;

  $('typing-area').style.display = 'none';
  $('controls').style.display    = 'none';
  $('results').style.display     = 'flex';

  $('r-wpm').childNodes[0].textContent = wpm;
  $('r-acc').textContent  = acc+'%';
  $('r-time').textContent = elapsed.toFixed(1)+'s';
  $('r-pb').textContent   = pb+' wpm';
  $('pb-badge').style.display = wpm>=pb ? 'inline' : 'none';

  renderWPMChart();
  if (Object.keys(mistakeMap).length > 0) renderHeatmap();
}

// ── WPM Chart (Chart.js) ────────────────────────────────────────────────────
function renderWPMChart() {
  if (wpmHistory.length < 2) return;
  $('chart-wrap').style.display = 'block';
  wpmChart = new Chart($('wpm-chart'), {
    type: 'line',
    data: {
      labels: wpmHistory.map(p=>p.t.toFixed(0)+'s'),
      datasets:[{
        data: wpmHistory.map(p=>p.wpm),
        borderColor:'#cba6f7', backgroundColor:'rgba(203,166,247,.1)',
        borderWidth:2, pointRadius:2, pointBackgroundColor:'#cba6f7',
        tension:.35, fill:true,
      }]
    },
    options:{
      responsive:true,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>c.parsed.y.toFixed(0)+' wpm'}} },
      scales:{
        x:{ticks:{color:'#585b70',font:{size:10}}, grid:{color:'#313244'}},
        y:{ticks:{color:'#585b70',font:{size:10}}, grid:{color:'#313244'}, beginAtZero:true}
      }
    }
  });
}

// ── Keyboard heatmap ────────────────────────────────────────────────────────
const kbRows = [
  ['`','1','2','3','4','5','6','7','8','9','0','-','='],
  ['q','w','e','r','t','y','u','i','o','p','[',']','\\'],
  ['a','s','d','f','g','h','j','k','l',';',"'"],
  ['z','x','c','v','b','n','m',',','.','/'],
];

function renderHeatmap() {
  $('heatmap-wrap').style.display = 'block';
  const kb = $('keyboard');
  kb.innerHTML = '';
  const maxCount = Math.max(...Object.values(mistakeMap), 1);

  const makeKey = (label, mapKey) => {
    const el = document.createElement('div');
    el.className = 'key' + (label==='\\' ? ' w15' : label==='enter' ? ' w2' : label==='tab' ? ' w15' : '');
    el.textContent = label;
    const count = mistakeMap[mapKey||label] || 0;
    if (count > 0) {
      const h = count/maxCount;
      const r = Math.round(69  + (243-69)  * h);
      const g = Math.round(71  + (139-71)  * h);
      const b = Math.round(90  + (168-90)  * h);
      el.style.background = `rgb(${r},${g},${b})`;
      el.style.color = h>.5 ? '#1e1e2e' : '#cdd6f4';
      el.style.borderColor = `rgb(${r},${g},${b})`;
      el.title = `${label}: ${count} mistake${count>1?'s':''}`;
    }
    return el;
  };

  kbRows.forEach((row, ri) => {
    const rowEl = document.createElement('div');
    rowEl.className = 'kb-row';
    if (ri===0) rowEl.appendChild(makeKey('tab','tab'));
    row.forEach(k => rowEl.appendChild(makeKey(k)));
    if (ri===0) rowEl.appendChild(makeKey('bksp', ''));
    if (ri===2) rowEl.appendChild(makeKey('enter','enter'));
    kb.appendChild(rowEl);
  });
  // Space row
  const spRow = document.createElement('div');
  spRow.className = 'kb-row';
  const spEl = document.createElement('div');
  spEl.className = 'key spc';
  spEl.textContent = 'space';
  const spCount = mistakeMap[' '] || 0;
  if (spCount>0){
    const h=spCount/maxCount;
    const r=Math.round(69+(243-69)*h), g=Math.round(71+(139-71)*h), b=Math.round(90+(168-90)*h);
    spEl.style.background=`rgb(${r},${g},${b})`;
    spEl.style.color=h>.5?'#1e1e2e':'#cdd6f4';
    spEl.title=`space: ${spCount} mistake${spCount>1?'s':''}`;
  }
  spRow.appendChild(spEl);
  kb.appendChild(spRow);
}

// ── Button wiring ───────────────────────────────────────────────────────────
$('mode-btns').querySelectorAll('.btn').forEach(btn => {
  btn.onclick = () => {
    $('mode-btns').querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    subOption = '';
    buildSubBtns();
    loadTest();
  };
});

$('btn-again').onclick = loadTest;
$('btn-menu').onclick = () => { reset(); $('typing-area').style.display=''; $('controls').style.display=''; loadTest(); };
$('word-display').onclick = focusInput;
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key==='r') { e.preventDefault(); loadTest(); }
  if (!finished) focusInput();
});

function focusInput() { $('hidden-input').focus(); }

buildSubBtns();
loadTest();
</script>
</body>
</html>
